name: Build ZfC APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" > /dev/null 2>&1 || true

      - name: Set up Gradle 8.14.3
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Build with Gradle
        run: gradle assembleRelease --no-daemon -p .

      - name: Show generated APK info
        run: |
          echo "=== Build output ==="
          find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo "=== Build log ==="
          cat app/build/outputs/**/*.txt 2>/dev/null | head -20 || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZfC-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
